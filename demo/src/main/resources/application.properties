# Configuration de base de données avec fallback local pour éviter le blanc sur Render
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:boree;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
# Laisser Hibernate détecter automatiquement le dialecte pour PostgreSQL ou H2
# spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
# Logging
logging.level.org.hibernate.orm.jdbc.bind=trace
server.port=${PORT:8080}
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace
spring.sql.init.mode=never